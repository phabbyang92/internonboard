<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HR 登录页原型</title>
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body>
    <main class="login-page">
      <section class="login-visual">
        <a class="brand" href="index.html">
          <span class="brand-mark">IN</span>
          <span>实习生入职登记系统</span>
        </a>
        <div>
          <h1 class="page-title">HR 后台入口</h1>
          <p class="page-subtitle">第一版用于查看学生提交资料与下载附件。后续可加入实习日期、工作地点、导出等维护功能。</p>
        </div>
        <div class="steps">
          <div class="step">
            <div class="step-number">1</div>
            <h3>创建链接</h3>
            <p>HR 创建 token 邀请。</p>
          </div>
          <div class="step">
            <div class="step-number">2</div>
            <h3>学生填写</h3>
            <p>学生网页提交信息。</p>
          </div>
          <div class="step">
            <div class="step-number">3</div>
            <h3>后台查看</h3>
            <p>HR 查看并下载附件。</p>
          </div>
          <div class="step">
            <div class="step-number">4</div>
            <h3>安排实习</h3>
            <p>后续维护日期地点。</p>
          </div>
        </div>
      </section>

      <section class="login-card">
        <form class="panel" data-login-form>
          <div class="panel-header">
            <div>
              <h2 class="panel-title">账号登录</h2>
              <p class="panel-note">静态原型中任意输入后可进入后台。</p>
            </div>
          </div>
          <div class="panel-body">
            <div class="section-stack">
              <div class="field">
                <label for="email">邮箱</label>
                <input id="email" type="email" value="hr@example.com">
              </div>
              <div class="field">
                <label for="password">密码</label>
                <input id="password" type="password" value="password">
              </div>
              <button class="btn primary" type="submit">登录后台</button>
              <div class="hidden-entry" data-hidden-entry>测试入口提示已触发：真实系统里可以用环境变量密码或隐藏入口辅助本地测试。</div>
              <p class="login-footnote">讨论点：正式版本必须使用账号密码或公司统一认证；连续敲回车只适合本地 demo。</p>
            </div>
          </div>
        </form>
      </section>
    </main>
    <script src="assets/app.js"></script>
  </body>
</html>
